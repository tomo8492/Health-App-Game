# project.yml
# XcodeGen で VitaCity.xcodeproj を生成する設定ファイル
# 使い方: brew install xcodegen && xcodegen generate && open VitaCity.xcodeproj

name: VitaCity

options:
  bundleIdPrefix: com.vitacity
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  groupSortPosition: none
  generateEmptyDirectories: false
  defaultConfig: Debug

packages:
  VitaCityCore:
    path: .   # ルートの Package.swift を参照

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"       # iPhone のみ
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

configs:
  Debug:   debug
  Release: release

# ─────────────────────────────────────────────────────────────
# MARK: - Targets
# ─────────────────────────────────────────────────────────────

targets:

  # ── メインアプリ ──────────────────────────────────────────
  VitaCity:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - App
      - Core
      - Domain
      - Features
      - Infrastructure
      - Resources
      - path: Resources/PixelArt
        type: folder   # フォルダ参照（青フォルダ）- PNG そのままバンドル

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vitacity.app
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/VitaCity.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES

    dependencies:
      - package: VitaCityCore      # Sources/VitaCityCore/
      - sdk: SpriteKit.framework
      - sdk: HealthKit.framework
      - sdk: WidgetKit.framework
      - sdk: StoreKit.framework
      - target: VitaCityWidget
        embed: true

  # ── Widget Extension ──────────────────────────────────────
  VitaCityWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - VitaCityWidget

    # XcodeGen が VitaCityWidget/Info.plist を自動生成
    info:
      path: VitaCityWidget/Info.plist
      properties:
        CFBundleDisplayName: VITA CITY
        CFBundleIdentifier: com.vitacity.app.widget
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vitacity.app.widget
        CODE_SIGN_ENTITLEMENTS: VitaCityWidget/VitaCityWidget.entitlements
        SKIP_INSTALL: YES

    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

# ─────────────────────────────────────────────────────────────
# MARK: - Schemes
# ─────────────────────────────────────────────────────────────

schemes:
  VitaCity:
    build:
      targets:
        VitaCity: all
        VitaCityWidget: [build]
    run:
      config: Debug
      storeKitConfiguration: VitaCity.storekit   # Sandbox 購入テスト
    test:
      config: Debug
      targets: []       # Xcode テストは主アプリ側では未設定（swift test で実行）
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
